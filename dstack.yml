type: task
name: aigt-review-worker

python: "3.12"

files:
  - requirements.txt:/workflow/requirements.txt
  - processor.py:/workflow/processor.py
  - processor_config.py:/workflow/processor_config.py
  - processor_utils.py:/workflow/processor_utils.py
  - core.py:/workflow/core.py
  - pyproject.toml:/workflow/pyproject.toml
  - aigt:/workflow/aigt

spot_policy: auto

max_price: 0.20

env:
  - QUEUE_URL
  - QUEUE_API_KEY
  - BATCH_SIZE
  - EMPTY_QUEUE_SLEEP_SECONDS=60
  - HF_TOKEN
  - S3_ACCESS_KEY_ID
  - S3_SECRET_ACCESS_KEY
  - S3_ENDPOINT
  - S3_BUCKET
  - S3_FILE_PREFIX

  - AIGT_REPO_ID=DeepSee-io/qwen_adapters_aigt
  - AIGT_SUBDIR_BY_LANG_JSON={"en":"reviews/best"}
  - AIGT_REVISION=
  - AIGT_HF_TOKEN=

  - AIGT_DEVICE=cuda
  - AIGT_CACHE_POLICY=keep
  - AIGT_MAX_LEN=500
  - AIGT_BATCH_SIZE=16
  - AIGT_WINDOW_AI_THRESHOLD=0.5
  - AIGT_PREFER_BF16=1

commands:
  - cd /workflow
  - pwd
  - ls
  - pip install --no-cache-dir -r requirements.txt
  - pip install --no-cache-dir .
  - python3 processor.py

resources:
  gpu:
    memory: 24GB
    # name: ["A4000", "A4500", "A5000", "A6000", "RTX4090", "RTX4000Ada", "L4", "L40", "L40S"]

idle_duration: 6h

retry:
  on_events: [no-capacity, error, interruption]
  duration: 2d
